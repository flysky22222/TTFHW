name: Issue To PR

on:
  issues:
    types:
      - opened
      - edited
      - reopened
  issue_comment:
    types:
      - created

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  issue-to-pr:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.title, '【小数】')) ||
      (github.event_name == 'issue_comment' && contains(github.event.issue.title, '【小数】'))
    runs-on: ubuntu-latest
    concurrency:
      group: issue-to-pr-${{ github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run issue worker
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: npm run issue:run
